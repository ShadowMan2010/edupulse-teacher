<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — EduPulse</title>
  <style>html{color-scheme:dark;background:#0a0a0b!important}body{background:#0a0a0b!important;color:#f8fafc!important;font-family:Inter,system-ui,sans-serif!important}</style>
  <link rel="stylesheet" href="../css/theme.css">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
  <script src="../js/firebase-config.js"></script>
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 2rem;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      position: relative;
      z-index: 10;
      backdrop-filter: blur(24px);
    }
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo {
      width: 56px; height: 56px;
      border: 2px solid var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin: 0 auto 1rem;
      box-shadow: 0 0 20px rgba(0,255,255,0.3);
    }
    .login-title {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .login-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }
    .login-form { display: flex; flex-direction: column; gap: 1.25rem; }
    .login-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger);
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      display: none;
    }
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .login-footer a {
      color: var(--accent);
      text-decoration: none;
    }
    .password-toggle {
      position: relative;
    }
    .password-toggle .toggle-btn {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn-login {
      width: 100%;
      padding: 0.85rem;
      font-family: var(--font-display);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-blob" id="glowBlob"></div>

  <div class="login-page">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">⚡</div>
        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">Sign in to EduPulse attendance system</p>
      </div>

      <div class="login-error" id="loginError"></div>

      <form class="login-form" id="loginForm" autocomplete="off">
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" class="input-field" id="emailInput" placeholder="admin@edupulse.dev" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <div class="password-toggle">
            <input type="password" class="input-field" id="passwordInput" placeholder="••••••••" required>
            <button type="button" class="toggle-btn" id="togglePassword">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-login" id="loginBtn">
          ⚡ SIGN IN
        </button>
      </form>

      <div style="display:flex;align-items:center;gap:1rem;margin:1.5rem 0">
        <div style="flex:1;height:1px;background:var(--glass-border)"></div>
        <span style="font-size:0.8rem;color:var(--text-muted)">OR</span>
        <div style="flex:1;height:1px;background:var(--glass-border)"></div>
      </div>

      <button class="btn btn-outline" id="googleBtn" style="width:100%;padding:0.85rem;display:flex;align-items:center;justify-content:center;gap:0.75rem;font-size:0.9rem">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.56 10.56l7.97-5.97z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>

      <div class="login-footer">
        <p>Demo: admin@edupulse.dev / admin123</p>
        <p style="margin-top:0.5rem"><a href="/">← Back to home</a></p>
      </div>
    </div>
  </div>

  <script src="../js/theme.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var email = document.getElementById('emailInput').value.trim();
      var password = document.getElementById('passwordInput').value;
      var errorEl = document.getElementById('loginError');
      var btn = document.getElementById('loginBtn');

      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = '⏳ SIGNING IN...';

      loginWithEmail(email, password)
        .then(function(cred) {
          var uid = cred.user.uid;
          if (uid === 'demo-admin') {
            window.location.href = 'admin/dashboard.html';
            return;
          }
          dbGet('users/' + uid + '/role').then(function(role) {
            if (role === 'admin') window.location.href = 'admin/dashboard.html';
            else if (role === 'principal') window.location.href = 'principal/dashboard.html';
            else if (role === 'teacher') window.location.href = 'teacher/scan.html';
            else window.location.href = '../index.html';
          }).catch(function() {
            window.location.href = '../index.html';
          });
        })
        .catch(function(err) {
          errorEl.textContent = err.message;
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = '⚡ SIGN IN';
        });
    });

    document.getElementById('togglePassword').addEventListener('click', function() {
      var pwd = document.getElementById('passwordInput');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
    });

    // ── Google Sign-In ──
    function handleRedirect(cred) {
      var uid = cred.user.uid;
      dbGet('users/' + uid + '/role').then(function(role) {
        if (role === 'admin') window.location.href = 'admin/dashboard.html';
        else if (role === 'principal') window.location.href = 'principal/dashboard.html';
        else if (role === 'teacher') window.location.href = 'teacher/scan.html';
        else window.location.href = '../index.html';
      }).catch(function() {
        window.location.href = '../index.html';
      });
    }

    // Check for pending redirect result on page load
    auth.getRedirectResult().then(function(result) {
      if (result.user) handleRedirect(result);
    }).catch(function(err) {
      var errorEl = document.getElementById('loginError');
      if (err.code === 'auth/unauthorized-interface' || err.code === 'auth/web-context-unauthorized') {
        errorEl.textContent = 'Google sign-in not enabled. Use email/password or enable it in Firebase Console → Authentication → Sign-in method → Google.';
      } else if (err.code !== 'auth/no-current-user') {
        errorEl.textContent = err.message;
      }
      if (errorEl.textContent) errorEl.style.display = 'block';
    });

    document.getElementById('googleBtn').addEventListener('click', function() {
      var provider = new firebase.auth.GoogleAuthProvider();
      provider.addScope('profile');
      provider.addScope('email');
      auth.signInWithRedirect(provider);
    });
  </script>
</body>
</html>
